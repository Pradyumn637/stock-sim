services:
  - type: web
    name: stock-sim-backend
    env: python
    buildCommand: pip install -r requirements.txt && python backend/manage.py collectstatic --noinput
    startCommand: gunicorn --chdir backend server.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: server.settings
      - key: DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: stock-sim-db
          property: connectionString
databases:
  - name: stock-sim-db
    plan: free
